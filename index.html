<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Brine Shrimp Tank Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hud card" id="hud-panel">
      <button id="hud-toggle" class="hud-toggle" type="button" aria-expanded="true">Stats & Controls</button>
      <div id="hud-content" class="hud-content">
        <h1>Brine Shrimp Tank v2</h1>
        <p>Grow a stable colony. Feed carefully, maintain oxygen, and keep waste under control.</p>

        <div class="summary" id="summary"></div>
        <div class="warnings" id="warnings"></div>
        <div class="stats" id="stats"></div>

      <div class="buttons feed-buttons">
        <button id="add-eggs">Add Eggs</button>
        <button id="feed-light">Light Feed</button>
        <button id="feed-heavy">Heavy Feed</button>
      </div>

      <div class="controls">
        <label>
          Salinity
          <input id="salinity" type="range" min="0" max="100" value="55" />
        </label>
        <label>
          Temperature
          <input id="temperature" type="range" min="0" max="100" value="52" />
        </label>
        <label>
          Aeration
          <input id="aeration" type="range" min="0" max="100" value="58" />
        </label>
      </div>

      <div class="buttons utility-buttons">
        <button id="pause">Pause</button>
        <button id="speed">Speed x1</button>
        <button id="water-change">Water Change</button>
        <button id="restart">Restart</button>
      </div>

      <section class="milestones panel-block">
        <h2>Milestones</h2>
        <div id="milestones"></div>
      </section>

      <section class="panel-block">
        <h2>Tank Shop</h2>
        <div class="shop-grid" id="shop"></div>
      </section>

      <section class="panel-block">
        <h2>Trends</h2>
        <canvas id="history-graph" width="520" height="140"></canvas>
      </section>

      <label class="registry panel-block">
        Colony Registry
        <textarea id="shrimp-registry" readonly spellcheck="false"></textarea>
      </label>
      </div>
    </section>

    <section class="tank-wrap card">
      <div class="top-stats" id="top-stats">
        <div class="summary" id="summary"></div>
        <div class="warnings" id="warnings"></div>
        <div class="stats" id="stats"></div>
      </div>
      <canvas id="tank" width="960" height="600"></canvas>
      <div class="overlay" id="overlay"></div>
      <div class="tank-status-bar" id="tank-status-bar"></div>
      <button id="observe-toggle" class="observe-toggle" type="button" aria-pressed="false" title="Toggle observation mode">🔍 Observe</button>
      <div class="tank-menu-wrap">
        <button id="quick-menu-toggle" class="icon-button menu-toggle" title="Open tank actions" aria-label="Open tank actions" aria-expanded="false">☰</button>
        <div id="tank-action-menu" class="tank-action-menu" aria-label="Tank actions" hidden>
          <button id="quick-add-eggs" class="menu-action" title="Add eggs" aria-label="Add eggs">🥚 Add Eggs</button>
          <button id="quick-feed-light" class="menu-action" title="Light feed" aria-label="Light feed">🌿 Light Feed</button>
          <button id="quick-feed-heavy" class="menu-action" title="Heavy feed" aria-label="Heavy feed">🍽️ Heavy Feed</button>
          <button id="quick-water-change" class="menu-action" title="Water change" aria-label="Water change">💧 Water Change</button>
          <button id="quick-open-shop" class="menu-action" title="Open tank shop" aria-label="Open tank shop">🛒 Open Shop</button>
          <button id="quick-speed" class="menu-action" title="Change speed" aria-label="Change speed">⏩ Speed x1</button>
          <button id="quick-pause" class="menu-action" title="Pause or resume" aria-label="Pause or resume">⏸️ Pause</button>
        </div>
      </div>
      
    </section>
  </main>

  <script type="module" src="src/main.js?v=20260331e"></script>
</body>
</html>
